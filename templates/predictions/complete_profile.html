{% extends 'base.html' %}

{% block title %}Complete Profile{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card p-4">
        <h2 class="mb-4">Complete Your Profile</h2>
        <p>Please fill your crop application details before continuing.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save Profile</button>
        </form>
    </div>
</div>
{% endblock %}
